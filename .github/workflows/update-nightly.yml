name: Update nightly

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-nightly:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update spec
        run: ./update-nightly.sh

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No nightly update found."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add t3code-nightly.spec io.github.pingdotgg.t3code.metainfo.xml
          version="$(awk '/^Version:/ {print $2; exit}' t3code-nightly.spec)"
          git commit -m "Update T3 Code nightly to ${version}"
          git push
